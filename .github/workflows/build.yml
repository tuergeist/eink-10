name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "server/**"
      - "docs/renderer-spec.md"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "server/**"
      - "docs/renderer-spec.md"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Compute short SHA
        id: shortsha
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Trigger k8s-infra deploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.K8S_INFRA_DISPATCH_TOKEN }}
          repository: expert-sieve/k8s-infra
          event-type: deploy-simple
          client-payload: '{"app":"eink","image_tag":"sha-${{ steps.shortsha.outputs.sha }}"}'
