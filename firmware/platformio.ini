; PlatformIO Project Configuration File
; Inkplate 6 + 10 (ESP32-WROVER-E, 4MB flash, 8MB PSRAM)
;
; Both envs share src/main.cpp. They differ in:
;   - the Inkplate library define (panel + driver)
;   - EINK_CHANNEL (where on the server they push/pull from)
;   - upload_port (which USB-Serial bridge to talk to)
;
; pio run -e inkplate10 -t upload   ; for the big one
; pio run -e ink6       -t upload   ; for the small one

[env]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    https://github.com/SolderedElectronics/Inkplate-Arduino-library.git
    bblanchon/ArduinoJson@^7.2.0

[env:inkplate10]
upload_port = /dev/cu.usbserial-10
monitor_port = /dev/cu.usbserial-10
build_flags =
    ${env.build_flags}
    -DARDUINO_INKPLATE10
    -DEINK_CHANNEL=\"inkplate10\"
    -DEINK_HAS_BATTERY=0    ; this unit runs on USB only — no Li-Po wired

[env:ink6]
upload_port = /dev/cu.usbserial-640
monitor_port = /dev/cu.usbserial-640
build_flags =
    ${env.build_flags}
    -DARDUINO_INKPLATE6
    -DEINK_CHANNEL=\"ink6\"
    -DEINK_HAS_BATTERY=1    ; flip to 0 if this unit also runs USB-only
